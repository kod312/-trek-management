{% extends "base.html" %}
{% block content %}
<h2>My Bookings</h2>
<table class="table">
    <thead>
        <tr>
            <th>Trek ID</th>
            <th>Booking Date</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for booking in bookings %}
        <tr>
            <td>{{ booking.trek_id }}</td>
            <td>{{ booking.booking_date }}</td>
            <td>{{ booking.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<form method="POST">
    <input type="text" name="name" placeholder="Full Name" value="{{ user.name or '' }}">
    <input type="text" name="contact" placeholder="Contact" value="{{ user.contact or '' }}">
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}

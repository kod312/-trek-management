{% extends "base.html" %}
{% block content %}
<table class="table">
	<thead>
		<tr>
			<th>User ID</th>
			<th>Booking Date</th>
			<th>Status</th>
		</tr>
	</thead>
	<tbody>
		{% for booking in bookings %}
		<tr>
			<td>{{ booking.user._id }}</td>
			<td>{{ booking.booking_date }}</td>
			<td>{{ booking.status }}</td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock %}

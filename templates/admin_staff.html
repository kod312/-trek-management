{% extends "base.html" %}
{% block content %}
<table class="table">
	<thead>
		<tr>
			<th>Username</th>
			<th>Email</th>
			<th>Status</th>
			<th>Is Blacklisted</th>
			<th>Actions</th>
		</tr>
	</thead>
	<tbody>
		{% for member in staff %}
		<tr>
			<td>{{member.username}}</td>
			<td>{{member.email}}</td>
			<td>{{member.status}}</td>
			<td>{{member.is_blacklisted}}</td>
			<td>
				<a href="/admin/staff/approve/{{ member.id }}" class="btn btn-sm btn-success">Approve</a>
                		<a href="/admin/user/blacklist/{{ member.id }}" class="btn btn-sm btn-danger">Blacklist</a>
                	</td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock %}

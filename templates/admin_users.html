{% extends "base.html" %}

{% block content %}

<table class="table">
	<thead>
		<tr>
			<th>Username</th>
			<th>Email</th>
			<th>Is blacklisted</th>
			<th> Actions </th>

		</tr>
	</thead>
	<tbody>
		{%for user in users%}
		<tr>
			<td>{{user.username}}</td>
			<td>{{user.email}}</td>
			<td>{{user.is_blacklisted}}</td>
			<td><a href="/admin/user/blacklist/{{ user.id }}" class="btn btn-sm btn-danger">Blacklist</a></td>
		</tr>
		{% endfor %}
	</tbody>
</table>


{% endblock %}
